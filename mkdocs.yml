site_name: Algorithms and Complexity
site_description: Complete lecture notes, worked examples, and study problems aligned with the course syllabus.
site_url: https://dchorazkiewicz.github.io/Algorithms_and_Complexity/
repo_url: https://github.com/dchorazkiewicz/Algorithms_and_Complexity
repo_name: dchorazkiewicz/Algorithms_and_Complexity
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.tabs
    - navigation.tabs.sticky
    - navigation.sections
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
      toc_depth: 2
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/extra.css
  - stylesheets/layout-fixes.css
  - stylesheets/data-structure-visualizations.css

extra_javascript:
  - javascripts/mathjax.js
  - javascripts/data-structure-visualizations.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

