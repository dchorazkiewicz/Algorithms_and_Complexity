site_name: Algorithms and Complexity
site_description: Complete lecture notes, worked examples, and study problems aligned with the course syllabus.
site_url: https://dchorazkiewicz.github.io/Algorithms_and_Complexity/
repo_url: https://github.com/dchorazkiewicz/Algorithms_and_Complexity
repo_name: dchorazkiewicz/Algorithms_and_Complexity
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  features:
    - navigation.instant
    - navigation.sections
    - navigation.top
    - navigation.footer
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Course home: index.md
  - Module 01 — Foundations of Algorithm Design:
      - Module overview: course/01-foundations-of-algorithm-design/index.md
      - Imperative computation: course/01-foundations-of-algorithm-design/imperative-computation.md
  - Course sources:
      - Polish syllabus: source/syllabus-pl.md
      - English syllabus: source/syllabus-en.md

strict: true
