site_name: Algorithms and Complexity
site_description: Complete lecture notes, worked examples, and study problems aligned with the course syllabus.
site_url: https://dchorazkiewicz.github.io/Algorithms_and_Complexity/
repo_url: https://github.com/dchorazkiewicz/Algorithms_and_Complexity
repo_name: dchorazkiewicz/Algorithms_and_Complexity
edit_uri: edit/main/docs/

theme:
  name: material
  language: en
  font:
    text: Inter
    code: JetBrains Mono
  features:
    - navigation.instant
    - navigation.instant.prefetch
    - navigation.instant.progress
    - navigation.tracking
    - navigation.sections
    - navigation.expand
    - navigation.path
    - navigation.indexes
    - navigation.top
    - navigation.footer
    - toc.follow
    - search.highlight
    - search.suggest
    - content.code.copy
    - content.tabs.link
  palette:
    - media: "(prefers-color-scheme: light)"
      scheme: default
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-7
        name: Switch to dark mode
    - media: "(prefers-color-scheme: dark)"
      scheme: slate
      primary: custom
      accent: custom
      toggle:
        icon: material/brightness-4
        name: Switch to light mode

plugins:
  - search

markdown_extensions:
  - admonition
  - attr_list
  - md_in_html
  - tables
  - toc:
      permalink: true
  - pymdownx.details
  - pymdownx.highlight:
      anchor_linenums: true
  - pymdownx.inlinehilite
  - pymdownx.superfences
  - pymdownx.tabbed:
      alternate_style: true
  - pymdownx.arithmatex:
      generic: true

extra_css:
  - stylesheets/extra.css
  - stylesheets/layout-fixes.css

extra_javascript:
  - javascripts/mathjax.js
  - https://unpkg.com/mathjax@3/es5/tex-mml-chtml.js

nav:
  - Home: index.md
  - Course map: course/index.md
  - 00 · Think Algorithmically:
      - course/00-learning-to-think-algorithmically/index.md
      - 1. Problems and algorithms: course/00-learning-to-think-algorithmically/01-problems-algorithms-programs.md
      - 2. Reading Python: course/00-learning-to-think-algorithmically/02-reading-python-as-an-algorithm.md
      - 3. Designing a solution: course/00-learning-to-think-algorithmically/03-designing-a-solution.md
      - 4. Correctness and cost: course/00-learning-to-think-algorithmically/04-evidence-correctness-and-cost.md
      - 5. How to study: course/00-learning-to-think-algorithmically/05-how-to-study-algorithms.md
      - 6. Review: course/00-learning-to-think-algorithmically/review.md
  - 01 · Algorithm Foundations:
      - course/01-foundations-of-algorithm-design/index.md
      - 1. Imperative computation: course/01-foundations-of-algorithm-design/imperative-computation.md
  - Sources:
      - Polish syllabus: source/syllabus-pl.md
      - English syllabus: source/syllabus-en.md

strict: true
